name: Build Result image

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3


      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: docker build . -f Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/crud-frontend

      - name: Docker Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/crud-frontend:latest



      - name: SSH into EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/crud-frontend
            sudo docker stop crud-frontend
            sudo docker rm crud-frontend

            sudo docker run -d -p 80:80 --name crud-frontend ${{ secrets.DOCKER_USERNAME }}/crud-frontend
